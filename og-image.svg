<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- 細紋背景 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D88A2A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#BA7517" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="200" fill="url(#amberGlow)"/>

  <!-- 左上小 Logo -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="56" height="56" rx="10" fill="#0a0a0a" stroke="#BA7517" stroke-width="2"/>
    <rect x="12" y="18" width="6" height="20" rx="1" fill="#BA7517"/>
    <rect x="22" y="12" width="6" height="32" rx="1" fill="#BA7517"/>
    <rect x="32" y="20" width="6" height="16" rx="1" fill="#BA7517"/>
    <text x="76" y="36" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="#FAF9F6">Cadence</text>
    <text x="76" y="54" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#BA7517">節 拍</text>
  </g>

  <!-- 主標題 -->
  <text x="80" y="320" font-family="-apple-system, system-ui, sans-serif" font-size="96" font-weight="800" fill="#FAF9F6" letter-spacing="-2">每天 5 分鐘</text>
  <text x="80" y="430" font-family="-apple-system, system-ui, sans-serif" font-size="96" font-weight="800" fill="#FAF9F6" letter-spacing="-2">
    跟上 <tspan fill="#BA7517">AI 與 Web3</tspan>
  </text>

  <!-- 副標 -->
  <text x="80" y="500" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="400" fill="#a8a8a8">台灣首個結合早報 · 實戰教學 · Web3 入門的中文媒體</text>

  <!-- 底部標籤 -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="none" stroke="#BA7517" stroke-width="1.5"/>
    <text x="50" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#BA7517" text-anchor="middle">早報</text>

    <rect x="116" y="0" width="100" height="36" rx="18" fill="none" stroke="#BA7517" stroke-width="1.5"/>
    <text x="166" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#BA7517" text-anchor="middle">實驗室</text>

    <rect x="232" y="0" width="100" height="36" rx="18" fill="none" stroke="#BA7517" stroke-width="1.5"/>
    <text x="282" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#BA7517" text-anchor="middle">工具庫</text>

    <rect x="348" y="0" width="100" height="36" rx="18" fill="none" stroke="#BA7517" stroke-width="1.5"/>
    <text x="398" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#BA7517" text-anchor="middle">週報</text>

    <rect x="464" y="0" width="100" height="36" rx="18" fill="none" stroke="#BA7517" stroke-width="1.5"/>
    <text x="514" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#BA7517" text-anchor="middle">Web3</text>
  </g>

  <!-- 右側裝飾：節拍長條 -->
  <g transform="translate(900, 200)">
    <rect x="0" y="80" width="24" height="120" rx="4" fill="#BA7517" opacity="0.4"/>
    <rect x="40" y="40" width="24" height="200" rx="4" fill="#BA7517" opacity="0.7"/>
    <rect x="80" y="100" width="24" height="80" rx="4" fill="#BA7517" opacity="0.5"/>
    <rect x="120" y="20" width="24" height="240" rx="4" fill="#BA7517"/>
    <rect x="160" y="60" width="24" height="160" rx="4" fill="#BA7517" opacity="0.6"/>
    <rect x="200" y="100" width="24" height="80" rx="4" fill="#BA7517" opacity="0.4"/>
  </g>

  <!-- 右下角 URL -->
  <text x="1120" y="600" font-family="-apple-system, system-ui, monospace" font-size="16" font-weight="500" fill="#666" text-anchor="end">cadence.media</text>
</svg>
